<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MNIST Digit Predictor</title>
<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.17.1/dist/ort.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #0f0f13;
    color: #e8e8f0;
    min-height: 100vh;
    padding: 2rem 1rem;
  }
  .header { text-align: center; margin-bottom: 2rem; }
  .header h1 { font-size: 2rem; font-weight: 700; color: #fff; }
  .header p { color: #666; margin-top: 6px; font-size: 0.9rem; }
  .accent { color: #7c6dfa; }

  .container { max-width: 980px; margin: 0 auto; }

  .status-bar { text-align: center; margin-bottom: 1.5rem; font-size: 12px; color: #555; }
  .status-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: #facc15; margin-right: 6px; vertical-align: middle; }
  .status-dot.ready { background: #4ade80; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.3} }
  .status-dot.loading { animation: pulse 1s infinite; }

  /* Tab switcher */
  .tab-bar {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-bottom: 1.5rem;
  }
  .tab-btn {
    padding: 8px 20px;
    border-radius: 20px;
    border: 1px solid #2a2a3a;
    background: transparent;
    color: #666;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }
  .tab-btn.active {
    background: #7c6dfa;
    border-color: #7c6dfa;
    color: #fff;
  }

  .panels {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }
  @media (max-width: 640px) { .panels { grid-template-columns: 1fr; } }

  .panel {
    background: #1a1a24;
    border: 1px solid #2a2a3a;
    border-radius: 16px;
    padding: 1.5rem;
  }

  .panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1rem;
  }
  .panel-label { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: #555; }
  .model-select {
    background: #0f0f13;
    border: 1px solid #2a2a3a;
    border-radius: 8px;
    color: #e8e8f0;
    font-size: 13px;
    padding: 6px 10px;
    cursor: pointer;
    outline: none;
  }
  .model-select:focus { border-color: #7c6dfa; }

  /* Drawing canvas */
  .draw-wrap {
    position: relative;
    background: #000;
    border-radius: 12px;
    overflow: hidden;
    cursor: crosshair;
    touch-action: none;
  }
  .draw-canvas {
    display: block;
    width: 100%;
    height: 220px;
  }
  .draw-controls {
    display: flex;
    gap: 8px;
    margin-top: 8px;
  }
  .clear-btn {
    flex: 1;
    padding: 8px;
    border-radius: 8px;
    border: 1px solid #2a2a3a;
    background: transparent;
    color: #888;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .clear-btn:hover { border-color: #f87171; color: #f87171; }

  /* Upload zone */
  .upload-zone {
    border: 2px dashed #2a2a3a;
    border-radius: 12px;
    min-height: 220px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    cursor: pointer;
    position: relative;
    background: #0f0f13;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .upload-zone:hover { border-color: #7c6dfa; }
  .upload-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .upload-icon { font-size: 2rem; opacity: 0.3; }
  .upload-text { font-size: 13px; color: #555; }
  .upload-zone canvas { max-width: 130px; max-height: 130px; border-radius: 8px; image-rendering: pixelated; }
  .upload-filename { font-size: 11px; color: #555; max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .predict-btn {
    width: 100%;
    margin-top: 12px;
    padding: 11px;
    border-radius: 10px;
    border: none;
    background: #7c6dfa;
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }
  .predict-btn:hover:not(:disabled) { background: #6a5ce8; }
  .predict-btn:active:not(:disabled) { transform: scale(0.98); }
  .predict-btn:disabled { background: #2a2a3a; color: #555; cursor: not-allowed; }

  .result-box {
    margin-top: 14px;
    background: #0f0f13;
    border: 1px solid #2a2a3a;
    border-radius: 12px;
    padding: 1rem;
    min-height: 80px;
  }
  .result-empty { color: #444; font-size: 13px; display: flex; align-items: center; justify-content: center; height: 56px; }
  .result-digit-row { display: flex; align-items: baseline; gap: 10px; margin-bottom: 6px; }
  .result-digit { font-size: 3rem; font-weight: 800; color: #7c6dfa; line-height: 1; }
  .result-conf { font-size: 13px; color: #666; }
  .model-info { font-size: 11px; color: #444; margin-bottom: 8px; }

  .bars { display: flex; flex-direction: column; gap: 4px; }
  .bar-row { display: flex; align-items: center; gap: 8px; font-size: 11px; }
  .bar-lbl { width: 14px; color: #555; text-align: right; font-weight: 600; }
  .bar-track { flex: 1; height: 5px; background: #1a1a24; border-radius: 3px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 3px; background: #2a2a3a; transition: width 0.4s ease; }
  .bar-fill.top { background: #7c6dfa; }
  .bar-pct { width: 36px; color: #555; text-align: right; font-size: 10px; }

  .spinner { width: 14px; height: 14px; border: 2px solid #2a2a3a; border-top-color: #7c6dfa; border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { color: #555; font-size: 13px; display: flex; align-items: center; gap: 8px; height: 56px; }

  .compare-section {
    margin-top: 20px;
    background: #1a1a24;
    border: 1px solid #2a2a3a;
    border-radius: 16px;
    padding: 1.25rem 1.5rem;
    display: none;
  }
  .compare-section.visible { display: block; }
  .compare-title { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: #555; margin-bottom: 1rem; text-align: center; }
  .compare-row { display: flex; align-items: center; justify-content: space-between; gap: 1rem; }
  .compare-side { text-align: center; flex: 1; }
  .compare-model-name { font-size: 11px; color: #555; margin-bottom: 4px; }
  .compare-digit { font-size: 2.5rem; font-weight: 800; color: #e8e8f0; line-height: 1; }
  .compare-conf { font-size: 12px; color: #666; margin-top: 2px; }
  .compare-vs { color: #333; font-weight: 700; font-size: 14px; }
  .verdict-wrap { text-align: center; margin-top: 14px; }
  .verdict { padding: 8px 16px; border-radius: 20px; font-size: 13px; font-weight: 600; display: inline-block; }
  .verdict.agree { background: #0d2a1a; color: #4ade80; border: 1px solid #166534; }
  .verdict.disagree { background: #2a0d0d; color: #f87171; border: 1px solid #991b1b; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>MNIST <span class="accent">Digit Predictor</span></h1>
    <p>Draw a digit or upload an image — compare 4 trained models</p>
  </div>

  <div class="status-bar">
    <span class="status-dot loading" id="status-dot"></span>
    <span id="status-text">Loading models...</span>
  </div>

  <!-- Tab bar -->
  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('draw')">✏️ Draw</button>
    <button class="tab-btn" onclick="switchTab('upload')">📁 Upload Image</button>
  </div>

  <div class="panels">
    <!-- Panel A -->
    <div class="panel">
      <div class="panel-header">
        <span class="panel-label">Model A</span>
        <select class="model-select" id="sel-A" onchange="onModelChange('A')">
          <option value="mycnn">MyCNN (~99.2%)</option>
          <option value="lenet">LeNet-5 (~98.8%)</option>
          <option value="resnet">ResNet-18 (~99.3%)</option>
          <option value="mobilenet">MobileNet-v2 (~99.0%)</option>
        </select>
      </div>

      <!-- Draw mode A -->
      <div id="draw-mode-A">
        <div class="draw-wrap">
          <canvas class="draw-canvas" id="draw-A" width="280" height="280"></canvas>
        </div>
        <div class="draw-controls">
          <button class="clear-btn" onclick="clearCanvas('A')">Clear</button>
        </div>
      </div>

      <!-- Upload mode A -->
      <div id="upload-mode-A" style="display:none;">
        <div class="upload-zone" id="zone-A">
          <input type="file" accept="image/*" onchange="onFile(event,'A')">
          <div id="zone-content-A">
            <div class="upload-icon">&#8679;</div>
            <div class="upload-text">Click or drag image here</div>
          </div>
        </div>
      </div>

      <button class="predict-btn" id="btn-A" onclick="predict('A')">Predict</button>
      <div class="result-box" id="result-A">
        <div class="result-empty">Draw or upload a digit, then predict</div>
      </div>
    </div>

    <!-- Panel B -->
    <div class="panel">
      <div class="panel-header">
        <span class="panel-label">Model B</span>
        <select class="model-select" id="sel-B" onchange="onModelChange('B')">
          <option value="lenet">LeNet-5 (~98.8%)</option>
          <option value="mycnn">MyCNN (~99.2%)</option>
          <option value="resnet">ResNet-18 (~99.3%)</option>
          <option value="mobilenet">MobileNet-v2 (~99.0%)</option>
        </select>
      </div>

      <!-- Draw mode B -->
      <div id="draw-mode-B">
        <div class="draw-wrap">
          <canvas class="draw-canvas" id="draw-B" width="280" height="280"></canvas>
        </div>
        <div class="draw-controls">
          <button class="clear-btn" onclick="clearCanvas('B')">Clear</button>
        </div>
      </div>

      <!-- Upload mode B -->
      <div id="upload-mode-B" style="display:none;">
        <div class="upload-zone" id="zone-B">
          <input type="file" accept="image/*" onchange="onFile(event,'B')">
          <div id="zone-content-B">
            <div class="upload-icon">&#8679;</div>
            <div class="upload-text">Click or drag image here</div>
          </div>
        </div>
      </div>

      <button class="predict-btn" id="btn-B" onclick="predict('B')">Predict</button>
      <div class="result-box" id="result-B">
        <div class="result-empty">Draw or upload a digit, then predict</div>
      </div>
    </div>
  </div>

  <!-- Compare -->
  <div class="compare-section" id="compare-section">
    <div class="compare-title">Comparison</div>
    <div class="compare-row">
      <div class="compare-side">
        <div class="compare-model-name" id="cmp-name-A">MyCNN</div>
        <div class="compare-digit" id="cmp-digit-A">–</div>
        <div class="compare-conf" id="cmp-conf-A"></div>
      </div>
      <div class="compare-vs">VS</div>
      <div class="compare-side">
        <div class="compare-model-name" id="cmp-name-B">LeNet</div>
        <div class="compare-digit" id="cmp-digit-B">–</div>
        <div class="compare-conf" id="cmp-conf-B"></div>
      </div>
    </div>
    <div class="verdict-wrap">
      <span class="verdict" id="verdict-badge">–</span>
    </div>
  </div>
</div>

<script>
const MODEL_FILES = {
  mycnn:    'mycnn_final.onnx',
  lenet:    'lenet_final.onnx',
  resnet:   'resnet_final.onnx',
  mobilenet:'mobilenet_final.onnx'
};
const MODEL_INFO = {
  mycnn:    { name:'MyCNN',        acc:'~99.2%', params:'~300K' },
  lenet:    { name:'LeNet-5',      acc:'~98.8%', params:'~60K'  },
  resnet:   { name:'ResNet-18',    acc:'~99.3%', params:'~11M'  },
  mobilenet:{ name:'MobileNet-v2', acc:'~99.0%', params:'~3.4M' }
};

const sessions = {};
const state = {
  A: { tensor: null, pred: null, conf: null },
  B: { tensor: null, pred: null, conf: null }
};
let currentTab = 'draw';

// ── Load models ──────────────────────────────────────────
async function loadModels() {
  const dot = document.getElementById('status-dot');
  const txt = document.getElementById('status-text');
  const keys = Object.keys(MODEL_FILES);
  let loaded = 0;
  for (const key of keys) {
    txt.textContent = `Loading ${MODEL_INFO[key].name}... (${loaded+1}/${keys.length})`;
    try {
      sessions[key] = await ort.InferenceSession.create(MODEL_FILES[key]);
      loaded++;
    } catch(e) {
      txt.textContent = `Error: ${MODEL_INFO[key].name} failed. Check .onnx files are in same folder.`;
      dot.className = 'status-dot';
      return;
    }
  }
  dot.className = 'status-dot ready';
  txt.textContent = `All ${loaded} models ready`;
}

// ── Tab switch ───────────────────────────────────────────
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach((b,i) => {
    b.classList.toggle('active', (i===0 && tab==='draw') || (i===1 && tab==='upload'));
  });
  ['A','B'].forEach(side => {
    document.getElementById('draw-mode-'+side).style.display   = tab==='draw'   ? 'block' : 'none';
    document.getElementById('upload-mode-'+side).style.display = tab==='upload' ? 'block' : 'none';
    state[side].tensor = null;
    state[side].pred   = null;
    state[side].conf   = null;
    document.getElementById('result-'+side).innerHTML =
      '<div class="result-empty">Draw or upload a digit, then predict</div>';
  });
  updateCompare();
}

// ── Drawing canvas ───────────────────────────────────────
['A','B'].forEach(side => {
  const canvas = document.getElementById('draw-'+side);
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#000';
  ctx.fillRect(0,0,280,280);
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 22;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  let drawing = false;
  let lastX = 0, lastY = 0;

  function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    if (e.touches) {
      return {
        x: (e.touches[0].clientX - rect.left) * scaleX,
        y: (e.touches[0].clientY - rect.top)  * scaleY
      };
    }
    return {
      x: (e.clientX - rect.left) * scaleX,
      y: (e.clientY - rect.top)  * scaleY
    };
  }

  function startDraw(e) {
    e.preventDefault();
    drawing = true;
    const pos = getPos(e);
    lastX = pos.x; lastY = pos.y;
    ctx.beginPath();
    ctx.arc(lastX, lastY, 11, 0, Math.PI*2);
    ctx.fillStyle = '#fff';
    ctx.fill();
  }
  function draw(e) {
    e.preventDefault();
    if (!drawing) return;
    const pos = getPos(e);
    ctx.beginPath();
    ctx.moveTo(lastX, lastY);
    ctx.lineTo(pos.x, pos.y);
    ctx.stroke();
    lastX = pos.x; lastY = pos.y;
  }
  function stopDraw(e) {
    e.preventDefault();
    drawing = false;
    // Extract tensor from canvas
    state[side].tensor = canvasToTensor(canvas);
  }

  canvas.addEventListener('mousedown',  startDraw);
  canvas.addEventListener('mousemove',  draw);
  canvas.addEventListener('mouseup',    stopDraw);
  canvas.addEventListener('mouseleave', stopDraw);
  canvas.addEventListener('touchstart', startDraw, {passive:false});
  canvas.addEventListener('touchmove',  draw,      {passive:false});
  canvas.addEventListener('touchend',   stopDraw,  {passive:false});
});

function clearCanvas(side) {
  const canvas = document.getElementById('draw-'+side);
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#000';
  ctx.fillRect(0,0,280,280);
  state[side].tensor = null;
  state[side].pred   = null;
  state[side].conf   = null;
  document.getElementById('result-'+side).innerHTML =
    '<div class="result-empty">Draw a digit, then predict</div>';
  updateCompare();
}

function canvasToTensor(canvas) {
  // Resize 280x280 → 28x28
  const small = document.createElement('canvas');
  small.width = 28; small.height = 28;
  const sCtx = small.getContext('2d');
  sCtx.drawImage(canvas, 0, 0, 28, 28);
  const px = sCtx.getImageData(0,0,28,28).data;
  const tensor = new Float32Array(28*28);
  for (let i = 0; i < 28*28; i++) {
    // Canvas is black bg white digit — perfect for MNIST, no invert needed
    tensor[i] = px[i*4] / 255.0;
  }
  return tensor;
}

// ── File upload ──────────────────────────────────────────
function onFile(e, side) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      // Preview
      const prev = document.createElement('canvas');
      prev.width = 130; prev.height = 130;
      prev.getContext('2d').drawImage(img, 0, 0, 130, 130);

      // Model tensor
      const small = document.createElement('canvas');
      small.width = 28; small.height = 28;
      const sCtx = small.getContext('2d');
      sCtx.fillStyle = 'white';
      sCtx.fillRect(0,0,28,28);
      sCtx.drawImage(img, 0, 0, 28, 28);
      const px = sCtx.getImageData(0,0,28,28).data;

      // Auto-detect: if avg brightness > 0.5 → white bg → invert
      let total = 0;
      for (let i=0;i<28*28;i++) {
        total += (0.299*px[i*4] + 0.587*px[i*4+1] + 0.114*px[i*4+2]) / 255;
      }
      const avg = total / (28*28);
      const invert = avg > 0.5;

      const tensor = new Float32Array(28*28);
      for (let i=0;i<28*28;i++) {
        const gray = (0.299*px[i*4] + 0.587*px[i*4+1] + 0.114*px[i*4+2]) / 255;
        tensor[i] = invert ? (1-gray) : gray;
      }
      state[side].tensor = tensor;
      state[side].pred   = null;
      state[side].conf   = null;

      const zone = document.getElementById('zone-content-'+side);
      zone.innerHTML = '';
      zone.appendChild(prev);
      const fn = document.createElement('div');
      fn.className = 'upload-filename';
      fn.textContent = file.name;
      zone.appendChild(fn);

      document.getElementById('result-'+side).innerHTML =
        '<div class="result-empty">Click Predict to run</div>';
      updateCompare();
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

// Drag & drop
['A','B'].forEach(side => {
  const zone = document.getElementById('zone-'+side);
  if (!zone) return;
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.style.borderColor='#7c6dfa'; });
  zone.addEventListener('dragleave', () => { zone.style.borderColor=''; });
  zone.addEventListener('drop', e => {
    e.preventDefault();
    zone.style.borderColor='';
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) {
      const fakeEvent = { target: { files: [file] } };
      onFile(fakeEvent, side);
    }
  });
});

// ── Predict ──────────────────────────────────────────────
async function predict(side) {
  // For draw mode, get tensor fresh from canvas
  if (currentTab === 'draw') {
    state[side].tensor = canvasToTensor(document.getElementById('draw-'+side));
  }
  if (!state[side].tensor) {
    document.getElementById('result-'+side).innerHTML =
      '<div class="result-empty" style="color:#f87171;">Please draw or upload a digit first.</div>';
    return;
  }
  const modelKey = document.getElementById('sel-'+side).value;
  const session  = sessions[modelKey];
  if (!session) {
    document.getElementById('result-'+side).innerHTML =
      '<div class="result-empty" style="color:#f87171;">Model not loaded yet. Wait...</div>';
    return;
  }

  document.getElementById('btn-'+side).disabled = true;
  document.getElementById('result-'+side).innerHTML =
    '<div class="loading-text"><div class="spinner"></div>Running inference...</div>';

  try {
    const inputTensor = new ort.Tensor('float32', state[side].tensor, [1,1,28,28]);
    const results = await session.run({ input: inputTensor });
    const output  = results.output.data;

    // Softmax
    const max  = Math.max(...output);
    const exps = Array.from(output).map(v => Math.exp(v - max));
    const sum  = exps.reduce((a,b) => a+b, 0);
    const probs = exps.map(v => v/sum);

    const pred = probs.indexOf(Math.max(...probs));
    const conf = (probs[pred]*100).toFixed(1);

    state[side].pred = pred;
    state[side].conf = conf;
    renderResult(side, pred, conf, probs, modelKey);
  } catch(err) {
    document.getElementById('result-'+side).innerHTML =
      `<div class="result-empty" style="color:#f87171;">Error: ${err.message}</div>`;
  }

  document.getElementById('btn-'+side).disabled = false;
  updateCompare();
}

function renderResult(side, pred, conf, probs, modelKey) {
  const info = MODEL_INFO[modelKey];
  const bars = probs.map((p,i) => {
    const pct = (p*100).toFixed(1);
    return `<div class="bar-row">
      <span class="bar-lbl">${i}</span>
      <div class="bar-track"><div class="bar-fill ${i===pred?'top':''}" style="width:${pct}%"></div></div>
      <span class="bar-pct">${pct}%</span>
    </div>`;
  }).join('');

  document.getElementById('result-'+side).innerHTML = `
    <div class="result-digit-row">
      <span class="result-digit">${pred}</span>
      <span class="result-conf">${conf}% confidence</span>
    </div>
    <div class="model-info">${info.name} · ${info.acc} accuracy · ${info.params} params</div>
    <div class="bars">${bars}</div>
  `;
}

function onModelChange(side) {
  state[side].pred = null;
  state[side].conf = null;
  document.getElementById('result-'+side).innerHTML =
    '<div class="result-empty">Model changed — click Predict again</div>';
  updateCompare();
}

function updateCompare() {
  const sec = document.getElementById('compare-section');
  const pA = state.A.pred, pB = state.B.pred;
  if (pA===null || pB===null) { sec.classList.remove('visible'); return; }
  sec.classList.add('visible');

  const mkA = document.getElementById('sel-A').value;
  const mkB = document.getElementById('sel-B').value;

  document.getElementById('cmp-name-A').textContent  = MODEL_INFO[mkA].name;
  document.getElementById('cmp-digit-A').textContent = pA;
  document.getElementById('cmp-conf-A').textContent  = state.A.conf + '%';
  document.getElementById('cmp-name-B').textContent  = MODEL_INFO[mkB].name;
  document.getElementById('cmp-digit-B').textContent = pB;
  document.getElementById('cmp-conf-B').textContent  = state.B.conf + '%';

  const badge = document.getElementById('verdict-badge');
  if (pA===pB) {
    badge.textContent = '✓ Both agree — Predicted: ' + pA;
    badge.className   = 'verdict agree';
  } else {
    badge.textContent = '✗ Disagree — A: ' + pA + ', B: ' + pB;
    badge.className   = 'verdict disagree';
  }
}

loadModels();
</script>
</body>
</html>
